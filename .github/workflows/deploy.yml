name: Deploy PetShop.Docs

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção (VitePress)
        run: npm run docs:build

      - name: Empacotar dist
        run: tar -czf dist.tar.gz -C .vitepress/dist .

      - name: Enviar pacote para EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist.tar.gz"
          target: "/tmp/"

      - name: Extrair e publicar na EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rm -rf /var/www/petshop-docs/*
            tar -xzf /tmp/dist.tar.gz -C /var/www/petshop-docs/
            rm -f /tmp/dist.tar.gz
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ PetShop.Docs publicado com sucesso!"
