# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name docs.petmob.com.br;
    return 301 https://$host$request_uri;
}

# HTTPS com Cloudflare Origin Certificate
server {
    listen 443 ssl;
    server_name docs.petmob.com.br;

    ssl_certificate     /etc/nginx/ssl/petmob.crt;
    ssl_certificate_key /etc/nginx/ssl/petmob.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/petshop-docs;
    index index.html;

    # VitePress — todas as rotas servem index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com hash gerados pelo VitePress — cache longo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — sem cache
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
}
